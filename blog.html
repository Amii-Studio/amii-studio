<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Blog — Amii Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint: #00FAB6;
      --black: #0a0a0a;
      --white: #fafafa;
      --font-body: 'Poppins', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', Roboto, sans-serif;
    }

    html { scroll-behavior: smooth; overflow-y: scroll; color-scheme: light; }

    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
    }

    /* ── PAGE LAYOUT ── */
    #blog-page { padding-top: 72px; }

    /* ── PAGE HEADER ── */
    #blog-header {
      padding: 48px 72px 40px;
      border-bottom: 1px solid rgba(10,10,10,0.1);
    }

    .blog-header-meta {
      display: flex;
      align-items: baseline;
      gap: 32px;
      margin-bottom: 12px;
    }
    .blog-header-meta span {
      font-size: clamp(0.8rem, 1vw, 1rem);
      font-weight: 400;
      line-height: 1;
    }
    .blog-header-meta .dim { opacity: 0.3; }

    .blog-title-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .blog-page-title-wrap {
      display: inline-block;
      overflow: hidden;
      line-height: 0.92;
      padding-bottom: 0.06em;
      vertical-align: bottom;
    }
    .blog-page-title {
      font-size: clamp(56px, 8vw, 120px);
      font-weight: 400;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      display: inline-block;
      transform: translateY(110%);
      will-change: transform;
    }
    .blog-arrow {
      width: clamp(40px, 4.5vw, 80px);
      height: clamp(40px, 4.5vw, 80px);
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(10px);
      will-change: transform, opacity;
    }

    /* ── TAG FILTER ── */
    #tag-filter {
      padding: 28px 72px;
      border-bottom: 1px solid rgba(10,10,10,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      opacity: 0;
    }

    .tag-btn {
      font-family: var(--font-body);
      font-size: clamp(0.72rem, 0.9vw, 0.85rem);
      font-weight: 400;
      color: rgba(10,10,10,0.5);
      background: none;
      border: 1px solid rgba(10,10,10,0.2);
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .tag-btn:hover {
      color: var(--black);
      border-color: rgba(10,10,10,0.5);
    }
    .tag-btn.active {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* ── BLOG BODY ── */
    #blog-body {
      padding: 56px 72px 120px;
    }

    /* ── ARTICLE GRID ── */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 56px 32px;
    }

    /* ── ARTICLE CARD ── */
    .blog-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      cursor: pointer;
      opacity: 0;
      transform: translateY(24px);
      text-decoration: none;
      color: inherit;
    }

    .blog-img {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      position: relative;
      background: #e0e0db;
      margin-bottom: 16px;
    }

    .blog-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .blog-card:hover .blog-img img { transform: scale(1.05); }

    .blog-img-placeholder {
      position: absolute;
      inset: 0;
      background: #e0e0db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(10,10,10,0.22);
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .blog-card:hover .blog-img-placeholder { transform: scale(1.05); }

    /* tag + date row */
    .blog-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .blog-card-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--black);
      background: transparent;
      border: 1px solid rgba(10,10,10,0.5);
      padding: 3px 10px;
    }
    .blog-card-date {
      font-size: 0.72rem;
      font-weight: 300;
      color: rgba(10,10,10,0.35);
      flex-shrink: 0;
    }
    .blog-card-title {
      font-size: clamp(0.9rem, 1.1vw, 1.05rem);
      font-weight: 500;
      line-height: 1.55;
      color: var(--black);
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .blog-card:hover .blog-card-title { opacity: 0.7; }
    .blog-card-excerpt {
      font-size: clamp(0.78rem, 0.9vw, 0.85rem);
      font-weight: 300;
      line-height: 1.65;
      color: rgba(10,10,10,0.45);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* hidden card */
    .blog-card.hidden {
      display: none;
    }

    /* empty state */
    #empty-state {
      display: none;
      grid-column: 1 / -1;
      padding: 80px 0;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(10,10,10,0.3);
      font-weight: 300;
    }

    /* ── ARTICLE OVERLAY ── */
    #article-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: var(--white);
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(0);
      transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: opacity, transform;
    }
    #article-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    #article-overlay.is-closing {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-48px);
    }

    /* ── close button ── */
    .close-btn {
      position: fixed;
      top: 24px;
      right: 68px;
      width: 48px;
      height: 48px;
      display: block;
      cursor: pointer;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      background: none;
      border: none;
      padding: 0;
      text-indent: -9999px;
      transition: opacity 0.3s ease 0.2s;
    }
    body.overlay-open .close-btn { pointer-events: auto; }
    .close-btn::before,
    .close-btn::after {
      content: '';
      width: 100%;
      height: 1px;
      background: var(--black);
      position: absolute;
      top: 50%;
      left: 0;
      transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .close-btn::before { transform: rotate(-45deg); }
    .close-btn::after  { transform: rotate(45deg); }
    .close-btn:hover::before { transform: rotate(-225deg); }
    .close-btn:hover::after  { transform: rotate(225deg); }
body.overlay-open .close-btn { opacity: 1; }

    #article-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 88px 24px 120px;
      transform: translateY(28px);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.06s,
                  opacity 0.4s ease 0.06s;
    }
    #article-overlay.open #article-inner {
      transform: translateY(0);
      opacity: 1;
    }

    /* article cover */
    .article-cover {
      width: 100%;
      aspect-ratio: 16/9;
      background: #e0e0db;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .article-cover img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .article-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(10,10,10,0.22);
    }

    /* article meta */
    .article-meta-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .article-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .article-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--black);
      background: transparent;
      border: 1px solid rgba(10,10,10,0.5);
      padding: 3px 10px;
    }
    .article-tag.secondary {
      color: var(--black);
      background: rgba(10,10,10,0.06);
      border: 1px solid transparent;
    }
    .article-date {
      font-size: 0.75rem;
      font-weight: 300;
      color: rgba(10,10,10,0.35);
    }
    .article-title {
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      font-weight: 500;
      line-height: 1.3;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
      color: var(--black);
    }

    /* article body text */
    .article-body {
      font-size: clamp(1rem, 1.1vw, 1.0625rem);
      font-weight: 400;
      line-height: 1.9;
      letter-spacing: 0.01em;
      color: rgba(10,10,10,0.85);
    }
    .article-body p {
      margin-bottom: 1.5em;
    }
    .article-body p:last-child { margin-bottom: 0; }
    .article-body strong {
      font-weight: 500;
      color: var(--black);
    }
    .article-body h3 {
      font-size: clamp(1rem, 1.3vw, 1.15rem);
      font-weight: 500;
      color: var(--black);
      margin: 2em 0 0.8em;
      letter-spacing: -0.01em;
    }
    .article-body blockquote {
      border-left: 2px solid var(--mint);
      padding-left: 20px;
      margin: 1.5em 0;
      color: rgba(10,10,10,0.55);
      font-style: italic;
    }
    .article-body figure {
      margin: 2em 0;
    }
    .article-body figure img,
    .article-body img {
      width: 100%;
      max-width: 560px;
      height: auto;
      display: block;
      margin: 0 auto;
    }
    .article-body figcaption {
      text-align: center;
      font-size: 0.8rem;
      color: rgba(10,10,10,0.4);
      margin-top: 8px;
    }

    /* book list */
    .book-list {
      margin: 1.5em 0;
      padding: 0;
      list-style: none;
    }
    .book-list li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(10,10,10,0.08);
      font-size: 0.9rem;
      color: rgba(10,10,10,0.65);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .book-list li:first-child { border-top: 1px solid rgba(10,10,10,0.08); }
    .book-list .book-title {
      font-weight: 500;
      color: var(--black);
    }
    .book-list .book-author {
      font-size: 0.8rem;
      color: rgba(10,10,10,0.4);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      #blog-header { padding: 40px 5% 32px; }
      #tag-filter { padding: 24px 5%; }
      #blog-body { padding: 48px 5% 80px; }
      .blog-grid { grid-template-columns: repeat(2, 1fr); gap: 48px 24px; }
      #article-close { right: 5%; }
    }

    @media (max-width: 768px) {
      #blog-header { padding: 32px 5% 28px; }
      #tag-filter { padding: 20px 5%; gap: 8px; }
      #blog-body { padding: 36px 5% 64px; }
      .blog-grid { grid-template-columns: 1fr; gap: 40px; }
      .blog-page-title { opacity: 1 !important; transform: none !important; }
      .blog-arrow { opacity: 1 !important; }
      #tag-filter { opacity: 1 !important; }
      .blog-card { opacity: 1 !important; transform: none !important; }
      .close-btn { top: 20px; right: 20px; }
      #article-inner { padding: 72px 24px 80px; }
    }

    /* ── prev / next navigation ── */
    .article-nav {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid rgba(10,10,10,0.1);
    }
    .article-nav-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      max-width: 45%;
      text-decoration: none;
      color: inherit;
    }
    .article-nav-item.next { align-items: flex-end; text-align: right; }
    .article-nav-label {
      font-size: 0.72rem;
      font-weight: 400;
      color: rgba(10,10,10,0.35);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .article-nav-item.next .article-nav-label { flex-direction: row-reverse; }
    .article-nav-arrow {
      font-size: 0.8rem;
      transition: transform 0.25s ease;
    }
    .article-nav-item:hover .article-nav-arrow { transform: translateX(-3px); }
    .article-nav-item.next:hover .article-nav-arrow { transform: translateX(3px); }
    .article-nav-title {
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      font-weight: 400;
      line-height: 1.45;
      color: var(--black);
      transition: opacity 0.2s;
    }
    .article-nav-item:hover .article-nav-title { opacity: 0.55; }
    .article-nav-placeholder { flex: 1; }

  </style>
  <link rel="icon" href="favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" href="favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png">
  <link rel="shortcut icon" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>

<!-- ── ARTICLE OVERLAY ── -->
<button class="close-btn" onclick="closeArticle()">Close</button>
<div id="article-overlay">  <div id="article-inner">
    <div class="article-cover" id="article-cover">
      <div class="article-cover-placeholder">Image coming soon</div>
    </div>
    <div class="article-meta-row">
      <div class="article-tags" id="article-tags"><span class="article-tag">設計觀點</span></div>
      <span class="article-date" id="article-date">2026.06.01</span>
    </div>
    <h1 class="article-title" id="article-title">文章標題</h1>
    <div class="article-body" id="article-body"></div>
    <nav class="article-nav" id="article-nav"></nav>
  </div>
</div>

<!-- ── MAIN PAGE ── -->
<div id="blog-page">

  <!-- PAGE HEADER -->
  <header id="blog-header">
    <div class="blog-header-meta">
      <span>Design Lens f/1.21</span>
    </div>
    <div class="blog-title-row">
      <div class="blog-page-title-wrap"><h1 class="blog-page-title">Blog</h1></div>
      <svg class="blog-arrow" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="12" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="84" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="84" y1="44" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
  </header>

  <!-- TAG FILTER -->
  <div id="tag-filter">
    <button class="tag-btn active" data-tag="全部">全部</button>
    <button class="tag-btn" data-tag="設計觀點">設計觀點</button>
    <button class="tag-btn" data-tag="美感育兒">美感育兒</button>
    <button class="tag-btn" data-tag="私人旅行座標">私人旅行座標</button>
    <button class="tag-btn" data-tag="個人意見">個人意見</button>
    <button class="tag-btn" data-tag="好物分享">好物分享</button>
    <button class="tag-btn" data-tag="親子手作">親子手作</button>
    <button class="tag-btn" data-tag="紙上好朋友">紙上好朋友</button>
  </div>

  <!-- ARTICLE LIST -->
  <main id="blog-body">
    <div class="blog-grid" id="blog-grid">
      <!-- 動態由 JS 產生 -->
      <div id="loading-state" style="grid-column:1/-1;padding:80px 0;text-align:center;font-size:0.85rem;color:rgba(10,10,10,0.3);font-weight:300;letter-spacing:0.06em;">Loading</div>
      <!-- empty state -->
      <div id="empty-state">沒有這個分類的文章</div>
    </div>
  </main>

</div>

<script src="components.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ── Page entrance animations（不依賴卡片，先跑） ── */
gsap.set('.blog-arrow', { opacity: 0, y: 12 });
gsap.set('#tag-filter', { opacity: 0 });
gsap.to('.blog-page-title', { y: '0%', duration: 1.0, ease: 'power4.out', delay: 0.2 });
gsap.to('.blog-arrow',      { opacity: 1, y: 0, duration: 0.7, ease: 'power2.out', delay: 0.5 });
gsap.to('#tag-filter',      { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.55 });

/* ── 全域文章資料（從 API 填入） ── */
let ARTICLES = [];

/* ── 日期格式化：ISO → YYYY.MM.DD ── */
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}.${m}.${day}`;
}

/* ── 動態產生卡片 HTML ── */
function createCardHTML(article, idx) {
  const imgHTML = article.coverImage
    ? `<img src="${article.coverImage}" alt="${article.title}" loading="lazy">`
    : `<div class="blog-img-placeholder">Image coming soon</div>`;
  const excerpt = article.summary || article.excerpt || '';
  const primaryTag = article.mainTag || article.primaryTag || '';
  return `
    <a class="blog-card" href="#" data-tag="${primaryTag}" data-id="${idx}">
      <div class="blog-img">${imgHTML}</div>
      <div class="blog-card-meta">
        <span class="blog-card-tag">${primaryTag}</span>
        <span class="blog-card-date">${formatDate(article.publishDate)}</span>
      </div>
      <p class="blog-card-title">${article.title}</p>
      ${excerpt ? `<p class="blog-card-excerpt">${excerpt}</p>` : ''}
    </a>`;
}

/* ── 卡片動畫（render 後觸發） ── */
function animateCards() {
  gsap.utils.toArray('.blog-card').forEach((card) => {
    gsap.to(card, {
      opacity: 1, y: 0, duration: 0.65, ease: 'power2.out',
      scrollTrigger: { trigger: card, start: 'top 88%' }
    });
  });
}

/* ── Tag filter 綁定（render 後呼叫） ── */
function bindTagFilter() {
  const tagBtns = document.querySelectorAll('.tag-btn');
  const empty   = document.getElementById('empty-state');

  tagBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tagBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const selected = btn.dataset.tag;
      let visible = 0;
      document.querySelectorAll('.blog-card').forEach(card => {
        if (selected === '全部' || card.dataset.tag === selected) {
          card.classList.remove('hidden');
          visible++;
        } else {
          card.classList.add('hidden');
        }
      });
      empty.style.display = visible === 0 ? 'block' : 'none';
    });
  });
}

/* ── Card click 綁定（render 後呼叫） ── */
function bindCardClicks() {
  document.querySelectorAll('.blog-card').forEach(card => {
    card.addEventListener('click', e => {
      e.preventDefault();
      const id = parseInt(card.dataset.id);
      openArticle(ARTICLES[id], id);
    });
  });
}

/* ── Fetch Notion API ── */
async function fetchPosts() {
  const grid    = document.getElementById('blog-grid');
  const loading = document.getElementById('loading-state');
  const empty   = document.getElementById('empty-state');

  try {
    const res  = await fetch('/api/posts');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // data 預期為陣列，每筆含：title, excerpt, primaryTag, secondaryTags, publishDate, coverImage
    ARTICLES = Array.isArray(data) ? data : (data.posts || data.results || []);

    if (ARTICLES.length === 0) {
      loading.style.display = 'none';
      empty.style.display   = 'block';
      return;
    }

    // 產生卡片 HTML
    const cardsHTML = ARTICLES.map((a, i) => createCardHTML(a, i)).join('');
    loading.remove();
    // 把卡片插到 empty-state 之前
    empty.insertAdjacentHTML('beforebegin', cardsHTML);

    // mobile：關掉動畫（同原本 CSS @media 行為）
    if (window.innerWidth <= 768) {
      document.querySelectorAll('.blog-card').forEach(c => {
        c.style.opacity = '1';
        c.style.transform = 'none';
      });
    }

    animateCards();
    bindTagFilter();
    bindCardClicks();

    // 支援從首頁帶 ?id=N 連結直接開啟對應文章
    const params = new URLSearchParams(location.search);
    const deepLinkId = parseInt(params.get('id'), 10);
    if (!isNaN(deepLinkId) && ARTICLES[deepLinkId]) {
      setTimeout(() => openArticle(ARTICLES[deepLinkId], deepLinkId), 300);
    }

  } catch (err) {
    console.error('Failed to fetch posts:', err);
    loading.textContent = '文章載入失敗，請重新整理頁面';
    loading.style.color = 'rgba(10,10,10,0.4)';
  }
}

fetchPosts();

function switchArticle(id) {
  const inner = document.getElementById('article-inner');
  inner.style.opacity = '0';
  inner.style.transform = 'translateY(16px)';
  setTimeout(() => {
    document.getElementById('article-overlay').scrollTop = 0;
    openArticle(ARTICLES[id], id);
    inner.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    inner.style.opacity = '1';
    inner.style.transform = 'translateY(0)';
    setTimeout(() => { inner.style.transition = ''; }, 400);
  }, 200);
}

/* ── Article overlay ── */
const articleOverlay = document.getElementById('article-overlay');

async function openArticle(data, id=0) {
  const sy = window.scrollY;
  document.body.style.top      = `-${sy}px`;
  document.body.style.position = 'fixed';
  document.body.style.left     = '0';
  document.body.style.right    = '0';

  // 封面圖
  const coverEl = document.getElementById('article-cover');
  if (data.coverImage) {
    coverEl.innerHTML = `<img src="${data.coverImage}" alt="${data.title}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  } else {
    coverEl.innerHTML = `<div class="article-cover-placeholder">Image coming soon</div>`;
  }

  const tagsEl  = document.getElementById('article-tags');
  const primaryTag = data.mainTag || data.primaryTag || '';
  const subTags    = data.subTags || data.secondaryTags || [];
  const allTags    = [primaryTag, ...subTags].filter(Boolean);
  tagsEl.innerHTML = allTags.map((t, i) =>
    `<span class="article-tag${i > 0 ? ' secondary' : ''}">${t}</span>`
  ).join('');
  document.getElementById('article-date').textContent  = formatDate(data.publishDate);
  document.getElementById('article-title').textContent = data.title;

  const bodyEl = document.getElementById('article-body');
  if (data.content) {
    bodyEl.innerHTML = data.content;
  } else {
    bodyEl.innerHTML = '<p>內文載入中…</p>';
    try {
      const res  = await fetch(`/api/posts?id=${encodeURIComponent(data.id)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      data.content = json.content || '';
      // 確認使用者沒有切到別篇文章
      if (document.getElementById('article-title').textContent === data.title) {
        bodyEl.innerHTML = data.content || '<p>（沒有內文）</p>';
      }
    } catch (err) {
      console.error('Failed to fetch article content:', err);
      bodyEl.innerHTML = '<p>內文載入失敗，請重新整理頁面</p>';
    }
  }

  // prev / next
  const nav = document.getElementById('article-nav');
  const idx = id;
  const prev = idx > 0 ? ARTICLES[idx - 1] : null;
  const next = idx < ARTICLES.length - 1 ? ARTICLES[idx + 1] : null;
  nav.innerHTML = (prev
    ? `<a class="article-nav-item prev" onclick="switchArticle(${idx-1})">
        <span class="article-nav-label"><span class="article-nav-arrow">←</span> 上一篇</span>
        <span class="article-nav-title">${prev.title}</span>
      </a>`
    : '<div class="article-nav-placeholder"></div>') +
  (next
    ? `<a class="article-nav-item next" onclick="switchArticle(${idx+1})">
        <span class="article-nav-label">下一篇 <span class="article-nav-arrow">→</span></span>
        <span class="article-nav-title">${next.title}</span>
      </a>`
    : '<div class="article-nav-placeholder"></div>');

  articleOverlay.scrollTop = 0;
  articleOverlay.classList.add('open');
  document.body.classList.add('overlay-open');
}

function closeArticle() {
  articleOverlay.classList.add('is-closing');
  setTimeout(() => {
    articleOverlay.classList.remove('open');
    articleOverlay.classList.remove('is-closing');
    document.body.classList.remove('overlay-open');
    const sy = parseInt(document.body.style.top || '0') * -1;
    document.body.style.position = '';
    document.body.style.top      = '';
    document.body.style.left     = '';
    document.body.style.right    = '';
    window.scrollTo(0, sy);
  }, 380);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeArticle();
});
</script>

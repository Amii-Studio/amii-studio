<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Works — Amii Studio</title>
  <link rel="icon" href="favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" href="favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint: #00FAB6;
      --black: #0a0a0a;
      --white: #fafafa;
      --font-body: 'Poppins', sans-serif;
    }

    html { scroll-behavior: smooth; overflow-y: scroll; color-scheme: light; }

    body {
      font-family: var(--font-body);
      background: #fafafa;
      color: #0a0a0a;
      overflow-x: hidden;
    }

    /* ── PAGE LAYOUT ── */
    #works-page {
      padding-top: 72px;
    }

    /* ── PAGE HEADER ── */
    #works-header {
      padding: 48px 72px 40px;
    }

    .works-header-meta {
      display: flex;
      align-items: baseline;
      gap: 32px;
      margin-bottom: 12px;
    }

    .works-header-meta span {
      font-size: clamp(0.8rem, 1vw, 1rem);
      font-weight: 400;
      line-height: 1;
    }

    .works-header-meta .dim { opacity: 0.3; }

    .works-title-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .works-page-title {
      font-size: clamp(56px, 8vw, 120px);
      font-weight: 400;
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      opacity: 0;
      transform: translateX(-60px);
    }

    .works-arrow {
      width: clamp(40px, 4.5vw, 80px);
      height: clamp(40px, 4.5vw, 80px);
      flex-shrink: 0;
      opacity: 0;
    }

    /* ── WORKS BODY ── */
    #works-body {
      padding: 64px 72px 120px;
    }

    /* ── CATEGORY SECTION ── */
    .works-category {
      margin-bottom: 96px;
    }
    .works-category:last-child { margin-bottom: 0; }

    .category-header {
      margin-bottom: 28px;
    }

    .category-title {
      font-size: clamp(1.1rem, 1.8vw, 2rem);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0;
      transform: translateY(16px);
    }

    .category-title .thin {
      font-weight: 300;
      opacity: 0.4;
    }

    .category-divider {
      width: 100%;
      height: 1px;
      background: rgba(10,10,10,0.15);
      transform: scaleX(0);
      transform-origin: left;
    }

    /* ── WORKS GRID ── */
    .works-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px 32px;
      margin-top: 28px;
    }

    /* ── WORK CARD ── */
    .work-card {
      display: flex;
      flex-direction: column;
      gap: 20px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(32px);
      text-decoration: none;
      color: inherit;
    }

    .work-img {
      width: 100%;
      aspect-ratio: 864 / 546;
      overflow: hidden;
      position: relative;
      background: #e0e0e0;
    }

    .work-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .work-card:hover .work-img img {
      transform: scale(1.05);
    }

    .work-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.45) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .work-card:hover .work-img::after { opacity: 1; }

    .work-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #e8e8e8 0%, #d8d8d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 400;
      color: rgba(10,10,10,0.22);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .work-card:hover .work-img-placeholder {
      transform: scale(1.05);
    }

    /* ── WORK INFO ── */
    .work-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* 上排：tags + year */
    .work-info-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .work-tags {
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      color: rgba(10,10,10,0.35);
      text-transform: capitalize;
    }

    .work-year {
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      color: rgba(10,10,10,0.3);
      flex-shrink: 0;
    }

    /* 下排：arrow + name */
    .work-name-wrap {
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* 水平箭頭 → 從左推入 */
    .work-arrow-inline {
      display: inline-flex;
      align-items: center;
      width: 0;
      overflow: hidden;
      opacity: 0;
      transition: width 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.25s ease;
      flex-shrink: 0;
    }
    .work-arrow-inline svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-right: 8px;
    }
    .work-card:hover .work-arrow-inline {
      width: 26px;
      opacity: 1;
    }

    .work-name {
      font-size: clamp(1.1rem, 1.6vw, 2rem);
      font-weight: 400;
      line-height: 1;
      text-transform: capitalize;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    /* ── DETAIL OVERLAY (方案 A) ── */
    #work-overlay {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: var(--white);
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(0);
      transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #work-overlay.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }
    #work-overlay.is-closing {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-48px);
    }

    #overlay-close {
      position: fixed;
      top: 24px;
      right: 72px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 410;
      background: none;
      border: none;
      padding: 0;
      opacity: 0;
      transition: opacity 0.3s ease 0.2s;
      overflow: hidden;
      font-size: 0;
      color: transparent;
      -webkit-tap-highlight-color: transparent;
    }
    #overlay-close::before,
    #overlay-close::after {
      content: '';
      width: 100%; height: 1.5px;
      background: #0a0a0a;
      position: absolute;
      top: 50%; left: 0;
      transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    }
    #overlay-close::before { transform: rotate(-45deg); }
    #overlay-close::after  { transform: rotate(45deg); }
    #overlay-close:hover::before { transform: rotate(-225deg); }
    #overlay-close:hover::after  { transform: rotate(225deg); }
    #work-overlay.open #overlay-close { opacity: 1; }
    #overlay-close.visible { opacity: 1; }

    #overlay-inner {
      max-width: 740px;
      margin: 0 auto;
      padding: 80px 24px 120px;
      transform: translateY(28px);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.06s,
                  opacity 0.4s ease 0.06s;
    }
    #work-overlay.open #overlay-inner {
      transform: translateY(0);
      opacity: 1;
    }

    .overlay-main-img {
      width: 100%;
      overflow: hidden;
      margin-bottom: 28px;
      background: #e0e0e0;
      aspect-ratio: 16/10;
    }
    .overlay-main-img img,
    .overlay-main-img .work-img-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-meta-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .overlay-tags {
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      color: rgba(10,10,10,0.35);
      text-transform: capitalize;
    }
    .overlay-year {
      font-size: clamp(0.75rem, 1vw, 1rem);
      font-weight: 400;
      color: rgba(10,10,10,0.3);
      flex-shrink: 0;
    }
    .overlay-title {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-transform: capitalize;
      margin-bottom: 20px;
    }
    .overlay-desc {
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      font-weight: 400;
      line-height: 1.7;
      color: rgba(10,10,10,0.7);
      margin-bottom: 48px;
    }
    .overlay-gallery {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .overlay-gallery-img {
      width: 100%;
      overflow: hidden;
      background: #e0e0e0;
      aspect-ratio: 16/10;
    }
    .overlay-gallery-img img,
    .overlay-gallery-img .work-img-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── DYNAMIC CONTENT FROM NOTION (overlay-gallery) ── */
    .overlay-gallery img,
    .overlay-gallery video {
      width: 100%;
      display: block;
    }
    .overlay-gallery figure { margin: 0; }
    .overlay-gallery figcaption {
      font-size: 0.8rem;
      color: rgba(10,10,10,0.4);
      margin-top: 8px;
    }
    .overlay-gallery .video-embed {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e0e0e0;
    }
    .overlay-gallery .video-embed iframe,
    .overlay-gallery .video-embed video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .overlay-gallery p {
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      line-height: 1.7;
      color: rgba(10,10,10,0.7);
      margin: 0;
    }
    .overlay-gallery h1,
    .overlay-gallery h2,
    .overlay-gallery h3 {
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .overlay-gallery hr {
      border: none;
      height: 1px;
      background: rgba(10,10,10,0.12);
    }
    .overlay-gallery .loading-state {
      font-size: 0.85rem;
      color: rgba(10,10,10,0.3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      #works-header { padding: 40px 5% 32px; }
      #works-body { padding: 48px 5% 80px; }
      .works-grid { gap: 56px 24px; }
      #overlay-close { right: 5%; }
    }

    @media (max-width: 768px) {
      #works-header { padding: 32px 5% 28px; }
      #works-body { padding: 36px 5% 64px; }
      .works-header-meta { gap: 20px; }
      .works-grid { grid-template-columns: 1fr; gap: 40px; }
      .works-category { margin-bottom: 60px; }
      .category-title { opacity: 1 !important; transform: none !important; }
      .work-card { opacity: 1 !important; transform: none !important; }
      .works-page-title { opacity: 1 !important; transform: none !important; }
      .works-arrow { opacity: 1 !important; }
      .category-divider { transform: scaleX(1) !important; }
      #overlay-close { top: 20px; right: 20px; }
      #overlay-inner { padding: 72px 24px 80px; }
    }
  </style>
</head>
<body>

<!-- ── CLOSE BUTTON（在 overlay 外，不受 overflow 影響）── -->
<button id="overlay-close" onclick="closeOverlay()" aria-label="Close"></button>

<!-- ── DETAIL OVERLAY ── -->
<div id="work-overlay">
  <div id="overlay-inner">
    <div class="overlay-main-img" id="overlay-main-img">
      <div class="work-img-placeholder">Image coming soon</div>
    </div>
    <div class="overlay-meta-row">
      <p class="overlay-tags" id="overlay-tags">Branding · UI/UX</p>
      <span class="overlay-year" id="overlay-year">2026</span>
    </div>
    <h2 class="overlay-title" id="overlay-title">Project Name</h2>
    <p class="overlay-desc" id="overlay-desc"></p>
    <div class="overlay-gallery" id="overlay-gallery"></div>
  </div>
</div>

<!-- ── MAIN PAGE ── -->
<div id="works-page">

  <header id="works-header">
    <div class="works-header-meta">
      <span>Selected works</span>
      <span class="dim">2021 – 2026</span>
    </div>
    <div class="works-title-row">
      <h1 class="works-page-title">Works</h1>
      <svg class="works-arrow" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="12" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="84" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="84" y1="44" x2="84" y2="84" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
  </header>

  <main id="works-body">

    <div id="works-categories"></div>

  </main>
</div>

<!-- components.js 移到 body 最底，確保 DOM 已就緒 -->
<script src="components.js"></script>

<script>
gsap.registerPlugin(ScrollTrigger);

gsap.to('.works-page-title', { opacity:1, x:0, duration:0.9, ease:'power3.out', delay:0.15 });
gsap.to('.works-arrow',      { opacity:1, duration:0.6, ease:'power2.out', delay:0.45 });

gsap.to('.works-page-title', { opacity:1, x:0, duration:0.9, ease:'power3.out', delay:0.15 });
gsap.to('.works-arrow',      { opacity:1, duration:0.6, ease:'power2.out', delay:0.45 });

/* ── Dynamic Works (from Notion via /api/works) ── */
const CATEGORY_ORDER = ['Website Design', 'UX・UI Design', 'Visual Identity'];
const CATEGORY_LABELS = {
  'Website Design': 'Website Design',
  'UX・UI Design': 'UX <span class="thin">|</span> UI Design',
  'Visual Identity': 'Visual Identity'
};

function escapeAttr(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;');
}

function isZhActive() {
  return localStorage.getItem('amii-lang') === 'zh';
}

function workCardHtml(work) {
  const tags = (work.subTags && work.subTags.length) ? work.subTags.join(' · ') : (work.category || '');
  const imgHtml = work.coverImage
    ? `<img src="${work.coverImage}" alt="${escapeAttr(work.title)}" loading="lazy" />`
    : `<div class="work-img-placeholder">Image coming soon</div>`;
  return `
    <a class="work-card" href="#"
       data-id="${escapeAttr(work.id)}"
       data-title="${escapeAttr(work.title)}"
       data-year="${escapeAttr(work.year)}"
       data-tags="${escapeAttr(tags)}"
       data-desc-zh="${escapeAttr(work.descriptionZh || '')}"
       data-desc-en="${escapeAttr(work.descriptionEn || '')}"
       data-cover="${escapeAttr(work.coverImage || '')}">
      <div class="work-img">${imgHtml}</div>
      <div class="work-info">
        <div class="work-info-top">
          <span class="work-tags">${tags}</span>
          <span class="work-year">${work.year || ''}</span>
        </div>
        <div class="work-name-wrap">
          <span class="work-arrow-inline"><svg viewBox="0 0 20 10" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="5" x2="16" y2="5" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round"/><polyline points="10,1 16,5 10,9" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
          <span class="work-name">${work.title || ''}</span>
        </div>
      </div>
    </a>`;
}

async function renderWorks() {
  const container = document.getElementById('works-categories');
  try {
    const res = await fetch('/api/works');
    const data = await res.json();
    const works = data.works || [];

    if (!works.length) {
      container.innerHTML = '<p style="opacity:0.35; font-size:0.9rem;">More works coming soon.</p>';
      return;
    }

    const grouped = {};
    works.forEach(w => {
      const cat = w.category || 'Other';
      (grouped[cat] = grouped[cat] || []).push(w);
    });

    const order = CATEGORY_ORDER.filter(c => grouped[c]);
    Object.keys(grouped).forEach(c => { if (!order.includes(c)) order.push(c); });

    container.innerHTML = order.map(cat => `
      <section class="works-category">
        <div class="category-header">
          <h2 class="category-title">${CATEGORY_LABELS[cat] || cat}</h2>
          <div class="category-divider"></div>
        </div>
        <div class="works-grid">
          ${grouped[cat].map(workCardHtml).join('')}
        </div>
      </section>
    `).join('');
  } catch (err) {
    container.innerHTML = '<p style="opacity:0.35; font-size:0.9rem;">Unable to load works right now.</p>';
  }

  initWorksInteractions();
}

function initWorksInteractions() {
  gsap.utils.toArray('.category-title').forEach(el => {
    gsap.to(el, { opacity:1, y:0, duration:0.65, ease:'power2.out',
      scrollTrigger:{ trigger:el, start:'top 88%' } });
  });
  gsap.utils.toArray('.category-divider').forEach(el => {
    gsap.to(el, { scaleX:1, duration:0.75, ease:'power2.inOut',
      scrollTrigger:{ trigger:el, start:'top 90%' } });
  });
  gsap.utils.toArray('.works-grid').forEach(grid => {
    gsap.to(grid.querySelectorAll('.work-card'), {
      opacity:1, y:0, duration:0.7, ease:'power2.out', stagger:0.1,
      scrollTrigger:{ trigger:grid, start:'top 82%' }
    });
  });

  document.querySelectorAll('.work-card').forEach(card => {
    card.addEventListener('click', e => {
      e.preventDefault();
      openOverlay({
        id: card.dataset.id,
        title: card.dataset.title,
        year: card.dataset.year,
        tags: card.dataset.tags,
        descZh: card.dataset.descZh,
        descEn: card.dataset.descEn,
        cover: card.dataset.cover
      });
    });
  });
}

renderWorks();

/* ── Overlay ── */
const overlay = document.getElementById('work-overlay');
const overlayContentCache = {};
let activeOverlayWork = null;

function renderOverlayDesc(work) {
  if (!work) return;
  const zh = isZhActive();
  const desc = (zh ? work.descZh : work.descEn) || work.descZh || work.descEn || '';
  document.getElementById('overlay-desc').textContent = desc;
}

window.addEventListener('amii-lang-change', () => {
  if (activeOverlayWork) renderOverlayDesc(activeOverlayWork);
});

async function openOverlay(work) {
  activeOverlayWork = work;
  const sy = window.scrollY;
  document.body.style.top = `-${sy}px`;
  document.body.style.position = 'fixed';
  document.body.style.left = '0';
  document.body.style.right = '0';

  document.getElementById('overlay-title').textContent = work.title || '';
  document.getElementById('overlay-year').textContent  = work.year || '';
  document.getElementById('overlay-tags').textContent  = work.tags || '';
  renderOverlayDesc(work);

  const mainImgEl = document.getElementById('overlay-main-img');
  mainImgEl.innerHTML = work.cover
    ? `<img src="${work.cover}" alt="${work.title || ''}" />`
    : `<div class="work-img-placeholder">Image coming soon</div>`;

  const gallery = document.getElementById('overlay-gallery');
  gallery.innerHTML = '<p class="loading-state">Loading…</p>';

  overlay.dataset.activeId = work.id || '';
  overlay.scrollTop = 0;
  overlay.classList.add('open');
  document.getElementById('overlay-close').classList.add('visible');

  if (!work.id) { gallery.innerHTML = ''; return; }

  try {
    let html = overlayContentCache[work.id];
    if (!html) {
      const res = await fetch(`/api/works?id=${work.id}`);
      const data = await res.json();
      html = data.content || '';
      overlayContentCache[work.id] = html;
    }
    // 防止切換到別的作品時，舊的內容覆蓋新的內容
    if (overlay.dataset.activeId === work.id) {
      gallery.innerHTML = html;
    }
  } catch (err) {
    if (overlay.dataset.activeId === work.id) gallery.innerHTML = '';
  }
}

function closeOverlay() {
  document.getElementById('overlay-close').classList.remove('visible');
  overlay.classList.add('is-closing');
  setTimeout(() => {
    overlay.classList.remove('open');
    overlay.classList.remove('is-closing');
    activeOverlayWork = null;
    const sy = parseInt(document.body.style.top || '0') * -1;
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    window.scrollTo(0, sy);
  }, 380);
}

// ESC 關閉
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOverlay();
});
</script>

</body>
</html>

<body>

  <p>Export 或截圖後拖放至此，或點擊選擇檔案</p>
  </div>

<div id="bgImg"></div>
<canvas id="particleCanvas"></canvas>

<script>

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadBg(file);
});

// ── Particle system ────────────────────────────────────────
const canvas = document.getElementById('particleCanvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particle origin: right side of screen (where figures are)
// Figures span roughly x: 25%–95%, y: 10%–100%
// We'll bias toward center-right (white dress ~38–58%)
// and right figures (65–90%)
function origin() {
  const W = canvas.width, H = canvas.height;
  const roll = Math.random();
  let x, y;
  if (roll < 0.5) {
    // White dress zone
    x = W * (0.38 + Math.random() * 0.20);
    y = H * (0.15 + Math.random() * 0.80);
  } else if (roll < 0.80) {
    // Right figures zone
    x = W * (0.62 + Math.random() * 0.28);
    y = H * (0.20 + Math.random() * 0.75);
  } else {
    // Colorful left figure
    x = W * (0.20 + Math.random() * 0.18);
    y = H * (0.30 + Math.random() * 0.65);
  }
  return { x, y };
}

// Colour: #20F4A9 with varying alpha for depth
function particleColor(alpha) {
  // slight hue variation: 20F4A9 base
  const r = 26  + (Math.random() * 10 | 0);
  const g = 235 + (Math.random() * 20 | 0);
  const b = 160 + (Math.random() * 15 | 0);
  return { r, g, b, a: alpha };
}

class Particle {
  constructor() { this.init(); }

  init() {
    const o = origin();
    this.x = o.x;
    this.y = o.y;

    // Move LEFT — mostly horizontal, slight drift
    const angle = Math.PI + (Math.random() - 0.5) * Math.PI * 0.45;
    const speed = 0.5 + Math.random() * 1.4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 0.08;

    this.size        = 0.8 + Math.random() * 2.8;
    this.life        = 0;
    this.maxLife     = 220 + Math.random() * 280;
    this.wobbleOff   = Math.random() * Math.PI * 2;
    this.wobbleSpd   = 0.025 + Math.random() * 0.035;
    this.wobbleAmp   = 0.15 + Math.random() * 0.45;

    // deeper = smaller & more transparent
    const depth = 0.3 + Math.random() * 0.7; // 0=far, 1=close
    this.size   *= (0.5 + depth * 0.5);
    this.baseAlpha = 0.25 + depth * 0.55;

    const c = particleColor(1);
    this.r = c.r; this.g = c.g; this.b = c.b;
  }

  preAge(steps) {
    for (let i = 0; i < steps; i++) {
      this.x += this.vx + Math.sin(i * this.wobbleSpd + this.wobbleOff) * this.wobbleAmp;
      this.y += this.vy;
      this.vx *= 0.999;
      this.vy *= 0.999;
    }
    this.life = Math.min(steps, this.maxLife - 1);
  }

  update() {
    this.life++;
    this.x += this.vx + Math.sin(this.life * this.wobbleSpd + this.wobbleOff) * this.wobbleAmp;
    this.y += this.vy;
    this.vx *= 0.9995;
    this.vy *= 0.9995;
    const offLeft = this.x < -20;
    if (this.life >= this.maxLife || offLeft) this.init();
  }

  draw() {
    const t = this.life / this.maxLife;
    let fade;
    if      (t < 0.12) fade = t / 0.12;
    else if (t > 0.68) fade = (1 - t) / 0.32;
    else               fade = 1;

    const alpha = this.baseAlpha * fade;
    if (alpha < 0.01) return;

    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${alpha})`;
    ctx.fill();

    // Glow on larger particles
    if (this.size > 1.6) {
      const gr = this.size * 3.5;
      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gr);
      grd.addColorStop(0, `rgba(${this.r},${this.g},${this.b},${alpha * 0.4})`);
      grd.addColorStop(1, `rgba(${this.r},${this.g},${this.b},0)`);
      ctx.beginPath();
      ctx.arc(this.x, this.y, gr, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }
  }
}

let animRunning = false;
let particles   = [];

function startParticles() {
  if (animRunning) return;
  animRunning = true;

  particles = Array.from({ length: 350 }, () => {
    const p = new Particle();
    p.preAge(Math.random() * p.maxLife | 0);
    return p;
  });

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) { p.update(); p.draw(); }
    requestAnimationFrame(loop);
  }
  loop();
}
startParticles();
</script>
